name: Misc

on:
  push:
    branches:
      - 'main'
  pull_request:
    types:
      - unlabeled
  workflow_dispatch:

concurrency:
  group: misc-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

env:
  SHARG_NO_VERSION_CHECK: 1
  TZ: Europe/Berlin

defaults:
  run:
    shell: bash -Eeuxo pipefail {0}

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: github.repository_owner == 'seqan' || github.event_name == 'workflow_dispatch' || github.event.label.name == 'lint'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Snippet clang17"
            compiler: "clang-17"
            build: snippet

          - name: "Snippet gcc11"
            compiler: "gcc-11"
            build: snippet
            cxx_flags: "-Wno-interference-size"

          - name: "Performance clang17"
            compiler: "clang-17"
            build: performance

          - name: "Performance gcc11"
            compiler: "gcc-11"
            build: performance
            cxx_flags: "-Wno-interference-size"

          - name: "Header clang17"
            compiler: "clang-17"
            build: header

          - name: "Header gcc14"
            compiler: "gcc-14"
            build: header
            cxx_flags: "-Wno-interference-size"

          - name: "Header gcc11"
            compiler: "gcc-11"
            build: header
            cxx_flags: "-Wno-interference-size"
    container:
      image: ghcr.io/seqan/${{ matrix.compiler }}
      volumes:
        - /home/runner:/home/runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          save-always: true
          key: ccache-${{ runner.os }}-${{ github.workflow }}-${{ matrix.compiler }}-${{ github.ref }}

      - name: Configure tests
        run: |
          mkdir build && cd build
          cmake ../test/${{ matrix.build }} -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="${{ matrix.cxx_flags }}"
          case "${{ matrix.build }}" in
            snippet) make gtest_main;;
            performance) make benchmark_main;;
            header) make gtest_main benchmark_main;;
          esac

      - name: Build tests
        working-directory: build
        run: |
          ccache -z
          make -k
          ccache -sv

      - name: Run tests
        working-directory: build
        run: ctest . -j --output-on-failure
